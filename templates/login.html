<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wesiya</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}

    {% if signup_message %}
        <p class="signup-message">{{ signup_message }}</p>
    {% endif %}

    <div class="container">

        <div class="box">
            <h2>Login</h2>
            <p class="small-text">Welcome back to Wesiya. Login to continue.</p>

            <form action="/login" method="POST">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>

                <button type="submit">Login</button>
            </form>
        </div>

        <div class="box">
            <h2>Sign Up</h2>
            <p class="small-text">Create your Wesiya account to save your writing notes and voice records.</p>

            <form action="/signup" method="POST">
                <label>Email</label>
                <input type="email" name="email" value="{{ signup_email or '' }}" placeholder="Create email" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Create password" required>

                <button type="submit">Sign Up</button>
            </form>
        </div>

    </div>

</body>
</html>
