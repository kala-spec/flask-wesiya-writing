<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Wesiya</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <nav class="pages">
        <ul>
            <li><a href="/home">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/profile">My Wesiya</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="/logout" class="logout-link">Logout</a></li>
        </ul>
    </nav>

    <section class="dashboard-header">
        <h1>Wesiya Dashboard</h1>
        <p>Write your text notes or record voice notes and save them to your profile.</p>
    </section>

    <main class="message-wrapper">

        <form action="/submit_note" method="POST" class="message-card">
            <h2>Text Note</h2>
            <p>Write your daily wesiya.</p>

            <label>Your Note</label>
            <textarea name="daily_note" rows="6" placeholder="Write your wesiya here..." required></textarea>

            <button type="submit">Save Text Note</button>
        </form>

        <form class="message-card" id="recordForm">
            <h2>Voice Recording</h2>
            <p>Record your wesiya.</p>

            <button type="button" id="startRecord">Start Recording</button>
            <br><br>

            <button type="button" id="stopRecord" disabled>Stop Recording</button>
            <br><br>

            <audio id="audioPlayback" controls style="width: 100%; display: none;"></audio>
            <br><br>

            <button type="button" id="sendRecording" disabled>Save Voice Recording</button>

            <p id="recordStatus"></p>
        </form>

    </main>

    <script>
    let mediaRecorder;
    let audioChunks = [];
    let recordedBlob;
    let currentStream;

    const startButton = document.getElementById("startRecord");
    const stopButton = document.getElementById("stopRecord");
    const sendButton = document.getElementById("sendRecording");
    const audioPlayback = document.getElementById("audioPlayback");
    const recordStatus = document.getElementById("recordStatus");

    startButton.addEventListener("click", async function () {
        try {
            const audioSettings = {
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 48000,
                    channelCount: 1
                }
            };

            currentStream = await navigator.mediaDevices.getUserMedia(audioSettings);

            let options = {};

            if (MediaRecorder.isTypeSupported("audio/webm;codecs=opus")) {
                options = {
                    mimeType: "audio/webm;codecs=opus",
                    audioBitsPerSecond: 128000
                };
            } else if (MediaRecorder.isTypeSupported("audio/webm")) {
                options = {
                    mimeType: "audio/webm",
                    audioBitsPerSecond: 128000
                };
            }

            mediaRecorder = new MediaRecorder(currentStream, options);
            audioChunks = [];

            mediaRecorder.ondataavailable = function (event) {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = function () {
                recordedBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
                const audioUrl = URL.createObjectURL(recordedBlob);

                audioPlayback.src = audioUrl;
                audioPlayback.style.display = "block";

                sendButton.disabled = false;
                recordStatus.innerText = "Recording ready to save.";

                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }
            };

            mediaRecorder.start();

            startButton.disabled = true;
            stopButton.disabled = false;
            sendButton.disabled = true;

            recordStatus.innerText = "Recording in higher quality...";
        } catch (error) {
            recordStatus.innerText = "Microphone permission denied or not available.";
            console.log(error);
        }
    });

    stopButton.addEventListener("click", function () {
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }

        startButton.disabled = false;
        stopButton.disabled = true;

        recordStatus.innerText = "Recording stopped.";
    });

    sendButton.addEventListener("click", async function () {
        if (!recordedBlob) {
            recordStatus.innerText = "No recording found.";
            return;
        }

        const formData = new FormData();
        formData.append("voice_recording", recordedBlob, "voice_note.webm");

        recordStatus.innerText = "Saving voice recording...";

        const response = await fetch("/save_voice_recording", {
            method: "POST",
            body: formData
        });

        if (response.redirected) {
            window.location.href = response.url;
        } else {
            const result = await response.text();
            recordStatus.innerText = result;
        }
    });
</script>

</body>
</html>
